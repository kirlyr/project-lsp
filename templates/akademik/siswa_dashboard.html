{% extends "akademik/base.html" %}
{% block content %}
<section class="panel">
  <h1>Siswa Dashboard</h1>
  <p>Selamat datang, {{ siswa.nama }}.</p>
  <table>
    <tbody>
      <tr>
        <th>NIS</th>
        <td>{{ siswa.nis }}</td>
      </tr>
      <tr>
        <th>Nama</th>
        <td>{{ siswa.nama }}</td>
      </tr>
      <tr>
        <th>Kelas</th>
        <td>{{ siswa.kelas }}</td>
      </tr>
      <tr>
        <th>Username</th>
        <td>{{ siswa.user.username }}</td>
      </tr>
    </tbody>
  </table>
  <div class="actions">
    <a class="button-link" href="{% url 'nilai_saya' %}">Lihat Nilai Saya</a>
  </div>
</section>
{% endblock %}
